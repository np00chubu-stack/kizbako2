<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>木箱依頼フォーム</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Hiragino Sans','Yu Gothic',sans-serif;background:#e8eaed;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:0}
/* スマホ実機では body全体を使う */
.phone{width:100%;max-width:430px;min-height:100vh;background:#f2f2f7;position:relative;display:flex;flex-direction:column;margin:0 auto}
.status-bar{height:env(safe-area-inset-top,0px);background:#f2f2f7;flex-shrink:0}
.screen{flex:1;overflow:hidden;position:relative}
.slide{position:absolute;top:0;left:0;width:100%;height:100%;background:#f2f2f7;transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden}
.slide.hidden-right{transform:translateX(100%);pointer-events:none}
.slide.hidden-left{transform:translateX(-100%);pointer-events:none}

/* ヘッダー */
.nav-header{padding:12px 16px 8px;background:#f2f2f7;flex-shrink:0}
.nav-back{display:flex;align-items:center;gap:2px;color:#007aff;font-size:16px;cursor:pointer;margin-bottom:4px;user-select:none;width:fit-content}
.nav-back svg{width:10px;height:16px;fill:none;stroke:#007aff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.nav-title{font-size:22px;font-weight:700;color:#000;letter-spacing:-.3px}
.nav-sub{font-size:13px;color:#8e8e93;margin-top:2px}
.scrollable{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px 24px}

/* アイコングリッド */
.icon-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px 10px;padding:16px 14px 24px}
.app-icon{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;user-select:none}
.icon-box{width:60px;height:60px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;text-align:center;line-height:1.25;padding:5px;transition:transform .1s,opacity .1s}
.app-icon:active .icon-box{transform:scale(.88);opacity:.75}
.icon-label{font-size:11px;color:#3c3c43;text-align:center;line-height:1.2;max-width:64px;word-break:break-all}

/* リストアイテム */
.list-section{background:#fff;border-radius:12px;overflow:hidden;margin-bottom:10px}
.list-row{padding:13px 16px;font-size:16px;color:#000;border-bottom:.5px solid #e5e5ea;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background .1s}
.list-row:last-child{border-bottom:none}
.list-row:active{background:#e5e5ea}
.list-row-arrow{color:#c7c7cc;font-size:18px;flex-shrink:0}

/* フォームセクション */
.form-section{background:#fff;border-radius:12px;overflow:hidden;margin-bottom:10px}
.form-row{padding:12px 16px;border-bottom:.5px solid #e5e5ea;display:flex;flex-direction:column;gap:4px}
.form-row:last-child{border-bottom:none}
.form-row-inline{padding:0 16px;border-bottom:.5px solid #e5e5ea;display:flex;align-items:center;min-height:44px}
.form-row-inline:last-child{border-bottom:none}
.field-label{font-size:13px;color:#8e8e93;margin-bottom:2px}
.section-label{font-size:13px;color:#8e8e93;margin:16px 0 6px;padding:0 4px;text-transform:uppercase;letter-spacing:.3px}

select,input[type=number],input[type=text],textarea{
  width:100%;padding:0;border:none;background:transparent;color:#000;
  font-size:16px;font-family:inherit;appearance:none;-webkit-appearance:none;outline:none
}
input[type=date]{
  width:100%;padding:2px 0;border:none;background:transparent;color:#000;
  font-size:15px;font-family:inherit;outline:none;
  /* Safari/iOS対応: appearance を残してネイティブピッカーを有効にする */
  -webkit-appearance:none;min-height:32px;cursor:pointer
}
select{color:#000}
select option{color:#000}
textarea{resize:none;line-height:1.5}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}

/* 台木トグル */
.toggle-wrap{display:flex;background:#e9e9eb;border-radius:9px;padding:2px;gap:2px;width:160px}
.toggle-opt{flex:1;padding:6px 0;text-align:center;font-size:14px;color:#3c3c43;border-radius:7px;cursor:pointer;transition:all .15s;user-select:none}
.toggle-opt.active{background:#fff;color:#000;font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.15)}

/* 選択済みバッジ */
.selected-card{background:#fff;border-radius:12px;padding:12px 16px;margin-bottom:10px}
.selected-cat{font-size:13px;color:#8e8e93}
.selected-size{font-size:17px;font-weight:600;color:#000;margin-top:2px}

/* 新サイズ通知 */
.new-size-notice{background:#fff9e6;border:1px solid #ffd60a;border-radius:12px;padding:12px 14px;margin-bottom:10px;font-size:13px;color:#3a2f00;line-height:1.6;display:none}
.new-size-notice.show{display:block}
.shikumi-btn{display:inline-block;margin-top:8px;padding:7px 14px;background:#856404;color:#fff;border-radius:8px;text-decoration:none;font-size:13px;font-weight:600}

/* 日付・数量行 */
.dq-row{display:flex;gap:8px;align-items:center;padding:12px 0;border-bottom:.5px solid #e5e5ea;min-height:52px}
.dq-row:last-child{border-bottom:none}
.dq-date{flex:1;display:flex;align-items:center}
.dq-date input[type=date]{font-size:15px;width:100%;min-height:36px}
.dq-qty{display:flex;align-items:center;gap:4px;flex-shrink:0}
.dq-qty input{width:56px;font-size:15px;text-align:right;background:transparent;border:none;outline:none;font-family:inherit;padding:0;min-height:36px}
.dq-unit{font-size:13px;color:#8e8e93;white-space:nowrap}
.dq-del{background:none;border:none;color:#ff3b30;font-size:20px;cursor:pointer;padding:0 4px;line-height:1;flex-shrink:0}
.add-dq-btn{width:100%;padding:12px 16px;background:#fff;border-radius:12px;border:none;color:#007aff;font-size:16px;cursor:pointer;text-align:left;margin-bottom:10px}

/* メインボタン */
.main-btn{width:100%;padding:15px;border:none;border-radius:14px;font-size:17px;font-weight:600;cursor:pointer;margin-bottom:8px}
.main-btn.blue{background:#007aff;color:#fff}
.main-btn.dark{background:#1c1c1e;color:#fff}
.main-btn.outline{background:#fff;color:#007aff;border:1.5px solid #007aff}
.main-btn:active{opacity:.75}

/* カートアイテム */
.cart-card{background:#fff;border-radius:12px;padding:13px 16px;margin-bottom:10px;position:relative}
.cart-cat{font-size:12px;color:#8e8e93}
.cart-size{font-size:16px;font-weight:600;color:#000;margin-top:2px}
.cart-meta{font-size:13px;color:#8e8e93;margin-top:3px}
.cart-del-btn{position:absolute;top:12px;right:14px;background:none;border:none;color:#c7c7cc;font-size:20px;cursor:pointer;line-height:1;padding:0}

/* タブバー */
.tab-bar{height:calc(56px + env(safe-area-inset-bottom,0px));background:rgba(242,242,247,.95);border-top:.5px solid #c6c6c8;display:flex;align-items:flex-start;justify-content:space-around;flex-shrink:0;padding-top:8px;padding-bottom:env(safe-area-inset-bottom,0px);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;opacity:.45;min-width:60px}
.tab-item.active{opacity:1}
.tab-item svg{width:24px;height:24px}
.tab-item span{font-size:10px;color:#8e8e93}
.tab-item.active span{color:#007aff}
.tab-icon-wrap{position:relative}
.tab-badge{position:absolute;top:-4px;right:-8px;background:#ff3b30;color:#fff;font-size:10px;border-radius:9px;padding:1px 5px;font-weight:700;display:none}

/* 成功画面 */
.success-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:32px}
.success-circle{width:72px;height:72px;border-radius:50%;background:#d1fae5;display:flex;align-items:center;justify-content:center}
.success-circle svg{width:36px;height:36px;stroke:#059669;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
.success-title{font-size:22px;font-weight:700;color:#000}
.success-sub{font-size:15px;color:#8e8e93;text-align:center;line-height:1.6}

/* メッセージ */
.msg{padding:10px 14px;border-radius:10px;font-size:14px;margin-bottom:10px;display:none}
.msg.err{background:#fff0f0;color:#c0392b;display:block}
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar"></div>

  <div class="screen">

    <!-- ===== HOME: カテゴリ ===== -->
    <div class="slide" id="s-home">
      <div class="nav-header">
        <div class="nav-title">🪵 木箱依頼</div>
        <div class="nav-sub">カテゴリを選択してください</div>
      </div>
      <div class="icon-grid" id="icon-grid"></div>
    </div>

    <!-- ===== SUBCAT ===== -->
    <div class="slide hidden-right" id="s-subcat">
      <div class="nav-header">
        <div class="nav-back" onclick="goTo('home')">
          <svg viewBox="0 0 10 16"><polyline points="8,2 2,8 8,14"/></svg>
          カテゴリ
        </div>
        <div class="nav-title" id="subcat-title"></div>
        <div class="nav-sub">サブカテゴリを選択</div>
      </div>
      <div class="scrollable"><div id="subcat-list"></div></div>
    </div>

    <!-- ===== SIZE ===== -->
    <div class="slide hidden-right" id="s-size">
      <div class="nav-header">
        <div class="nav-back" id="size-back-btn">
          <svg viewBox="0 0 10 16"><polyline points="8,2 2,8 8,14"/></svg>
          <span id="size-back-label"></span>
        </div>
        <div class="nav-title" id="size-title"></div>
        <div class="nav-sub" id="size-sub"></div>
      </div>
      <div class="scrollable"><div id="size-list"></div></div>
    </div>

    <!-- ===== DETAIL: 客先・台木・納入日 ===== -->
    <div class="slide hidden-right" id="s-detail">
      <div class="nav-header">
        <div class="nav-back" onclick="goTo('size')">
          <svg viewBox="0 0 10 16"><polyline points="8,2 2,8 8,14"/></svg>
          サイズ
        </div>
        <div class="nav-title">詳細入力</div>
      </div>
      <div class="scrollable">
        <div class="selected-card" id="detail-selected">
          <div class="selected-cat" id="detail-cat"></div>
          <div class="selected-size" id="detail-size"></div>
        </div>

        <div class="new-size-notice" id="new-size-notice">
          ⚠️ 新規カテゴリ・新サイズのため、指示書がまだありません。仕組オーダーシートを作成し、担当者に送ってください。
          <div><a class="shikumi-btn" id="shikumi-link" href="#" target="_blank" rel="noopener">🔧 仕組オーダーシートを開く</a></div>
        </div>

        <div class="section-label">客先名（任意）</div>
        <div class="form-section">
          <div class="form-row-inline">
            <select id="d-client-sel" onchange="onClientChange()" style="flex:1">
              <option value="">-- なし --</option>
            </select>
          </div>
          <div class="form-row-inline" id="d-client-other-row" style="display:none">
            <input type="text" id="d-client-text" placeholder="客先名を入力" style="flex:1;font-size:16px">
            <span onclick="clearClientOther()" style="color:#007aff;font-size:14px;cursor:pointer;margin-left:8px;white-space:nowrap">← 一覧</span>
          </div>
        </div>

        <div class="section-label">台木リフト</div>
        <div style="padding:0 4px;margin-bottom:10px">
          <div class="toggle-wrap">
            <div class="toggle-opt active" id="dml-nashi" onclick="setDaimoku('なし')">なし</div>
            <div class="toggle-opt" id="dml-ari" onclick="setDaimoku('あり')">あり</div>
          </div>
        </div>

        <div class="section-label">納入日・数量 <span style="color:#ff3b30">*</span></div>
        <div class="form-section" id="dq-container"></div>
        <button class="add-dq-btn" onclick="addDqRow()">＋ 日付・数量を追加</button>

        <div id="detail-msg" class="msg"></div>
        <button class="main-btn blue" onclick="addToCart()">カートに追加</button>
      </div>
    </div>

    <!-- ===== CART ===== -->
    <div class="slide hidden-right" id="s-cart">
      <div class="nav-header">
        <div class="nav-title">依頼内容</div>
        <div class="nav-sub" id="cart-sub"></div>
      </div>
      <div class="scrollable">
        <div class="section-label">依頼者名 <span style="color:#ff3b30">*</span></div>
        <div class="form-section">
          <div class="form-row-inline">
            <select id="c-requester" style="flex:1">
              <option value="">-- 選択してください --</option>
            </select>
          </div>
        </div>

        <div class="section-label">品目</div>
        <div id="cart-list"></div>
        <button class="main-btn outline" onclick="goTo('home')">＋ 品目を追加</button>

        <div class="section-label">備考（任意）</div>
        <div class="form-section">
          <div class="form-row">
            <textarea id="c-note" rows="3" placeholder="特記事項があれば入力してください"></textarea>
          </div>
        </div>

        <div id="cart-msg" class="msg"></div>
        <button class="main-btn dark" onclick="submitCart()" id="submit-btn">送信する</button>
      </div>
    </div>

    <!-- ===== SUCCESS ===== -->
    <div class="slide hidden-right" id="s-success">
      <div class="success-wrap">
        <div class="success-circle">
          <svg viewBox="0 0 24 24"><polyline points="20,6 9,17 4,12"/></svg>
        </div>
        <div class="success-title">送信完了！</div>
        <div class="success-sub" id="success-msg">依頼が送信されました。</div>
        <div id="shikumi-after-notice" style="display:none;background:#fff9e6;border:1px solid #ffd60a;border-radius:12px;padding:12px 14px;font-size:13px;color:#3a2f00;line-height:1.6;width:100%"></div>
        <button class="main-btn blue" style="margin-top:8px" onclick="resetAll()">続けて依頼する</button>
      </div>
    </div>

  </div><!-- /screen -->

  <!-- タブバー -->
  <div class="tab-bar">
    <div class="tab-item active" id="tab-home" onclick="goTo('home')">
      <div class="tab-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="#007aff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/>
          <rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>
        </svg>
      </div>
      <span>カテゴリ</span>
    </div>
    <div class="tab-item" id="tab-cart" onclick="goTo('cart')">
      <div class="tab-icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="#8e8e93" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" id="cart-icon">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        <span class="tab-badge" id="cart-badge"></span>
      </div>
      <span>依頼内容</span>
    </div>
  </div>

</div><!-- /phone -->

const colors=["#007aff","#34c759","#ff9500","#ff2d55","#5856d6","#00c7be","#ff6b35","#1a3a5c","#0f6e56","#993c1d","#534ab7","#3b6d11","#ba7517","#072a5e","#0a4a3a","#6d1a10","#2d1b6e","#1a3d0a","#6d1a3e","#4a2200","#1a4a6e","#6e3d1a"];

// ===== 初期化 =====
function init(){
  buildIconGrid();
  populateClientSelect();
  loadRequesters();
  loadClients();
  document.getElementById('shikumi-link').href = SHIKUMI_FORM_URL;
}

function buildIconGrid(){
  const grid = document.getElementById('icon-grid');
  grid.innerHTML='';
  Object.keys(itemData).forEach((cat,i)=>{
    const wrap = document.createElement('div');
    wrap.className='app-icon';
    const box = document.createElement('div');
    box.className='icon-box';
    box.style.background = colors[i % colors.length];
    box.textContent = cat;
    const lbl = document.createElement('div');
    lbl.className='icon-label';
    lbl.textContent = cat;
    wrap.appendChild(box); wrap.appendChild(lbl);
    wrap.onclick = ()=>selectCat(cat);
    grid.appendChild(wrap);
  });
}

function populateClientSelect(){
  const sel = document.getElementById('d-client-sel');
  const cur = sel.value;
  sel.innerHTML='<option value="">-- なし --</option>';
  CLIENTS.forEach(c=>{ const o=document.createElement('option'); o.value=c; o.textContent=c; sel.appendChild(o); });
  const ot=document.createElement('option'); ot.value='__other__'; ot.textContent='その他（直接入力）'; sel.appendChild(ot);
  if(cur && CLIENTS.includes(cur)) sel.value=cur;
}

function onClientChange(){
  const sel=document.getElementById('d-client-sel');
  const otherRow=document.getElementById('d-client-other-row');
  if(sel.value==='__other__'){
    sel.style.display='none'; otherRow.style.display='flex';
    document.getElementById('d-client-text').focus();
  }
}
function clearClientOther(){
  document.getElementById('d-client-sel').value=''; document.getElementById('d-client-sel').style.display='';
  document.getElementById('d-client-other-row').style.display='none';
  document.getElementById('d-client-text').value='';
}
function getClientVal(){
  const sel=document.getElementById('d-client-sel');
  if(sel.style.display==='none') return document.getElementById('d-client-text').value.trim();
  return sel.value==='__other__' ? document.getElementById('d-client-text').value.trim() : sel.value;
}

// ===== カテゴリ選択 =====
function selectCat(cat){
  currentCat=cat; currentSubcat='';
  const data=itemData[cat];
  if(typeof data==='object'&&!Array.isArray(data)){
    document.getElementById('subcat-title').textContent=cat;
    const list=document.getElementById('subcat-list');
    list.innerHTML='';
    const sec=document.createElement('div'); sec.className='list-section';
    Object.keys(data).forEach(sub=>{
      const row=document.createElement('div'); row.className='list-row';
      row.innerHTML=sub+'<span class="list-row-arrow">›</span>';
      row.onclick=()=>selectSubcat(sub);
      sec.appendChild(row);
    });
    list.appendChild(sec);
    goTo('subcat');
  } else {
    showSizes(data.filter(v=>v!=='該当なし'), cat, 'home');
  }
}

function selectSubcat(sub){
  currentSubcat=sub;
  const arr=itemData[currentCat][sub].filter(v=>v!=='該当なし');
  showSizes(arr, sub, 'subcat');
}

function showSizes(arr, title, backTo){
  sizeBackTarget=backTo;
  document.getElementById('size-title').textContent=title;
  document.getElementById('size-sub').textContent=currentCat+(currentSubcat?' › '+currentSubcat:'');
  document.getElementById('size-back-label').textContent=backTo==='home'?'カテゴリ':'サブカテゴリ';
  document.getElementById('size-back-btn').onclick=()=>goTo(backTo);
  const list=document.getElementById('size-list');
  list.innerHTML='';
  const sec=document.createElement('div'); sec.className='list-section';
  arr.forEach(size=>{
    const row=document.createElement('div'); row.className='list-row';
    row.innerHTML=size+'<span class="list-row-arrow">›</span>';
    row.onclick=()=>selectSize(size, false);
    sec.appendChild(row);
  });
  // その他（直接入力）
  const otherRow=document.createElement('div'); otherRow.className='list-row';
  otherRow.style.color='#007aff';
  otherRow.innerHTML='その他（直接入力）<span class="list-row-arrow">›</span>';
  otherRow.onclick=()=>{
    const v=prompt('サイズを入力（例: 2250×1350×1125）');
    if(v&&v.trim()) selectSize(v.trim(), true);
  };
  sec.appendChild(otherRow);
  list.appendChild(sec);
  goTo('size');
}

function selectSize(size, isNew){
  currentSize=size; currentSizeIsNew=isNew;
  const cat=currentCat+(currentSubcat?' / '+currentSubcat:'');
  document.getElementById('detail-cat').textContent=cat;
  document.getElementById('detail-size').textContent=size;
  // 新サイズ通知
  const notice=document.getElementById('new-size-notice');
  if(isNew) notice.classList.add('show'); else notice.classList.remove('show');
  // リセット
  daimoku='なし'; setDaimoku('なし');
  dqRows=[{date:'',qty:''}]; renderDqRows();
  document.getElementById('d-client-sel').value=''; document.getElementById('d-client-sel').style.display='';
  document.getElementById('d-client-other-row').style.display='none';
  document.getElementById('d-client-text').value='';
  document.getElementById('detail-msg').style.display='none';
  goTo('detail');
}

// ===== 台木トグル =====
function setDaimoku(val){
  daimoku=val;
  document.getElementById('dml-nashi').className='toggle-opt'+(val==='なし'?' active':'');
  document.getElementById('dml-ari').className='toggle-opt'+(val==='あり'?' active':'');
}

// ===== 納入日・数量 =====
function renderDqRows(){
  const cont=document.getElementById('dq-container');
  cont.innerHTML='';
  dqRows.forEach((row,i)=>{
    const wrap=document.createElement('div');
    wrap.className='dq-row';
    wrap.style.padding='10px 16px';
    wrap.innerHTML=`
      <div class="dq-date"><input type="date" value="${row.date}" onchange="dqRows[${i}].date=this.value"></div>
      <div class="dq-qty">
        <input type="number" min="1" value="${row.qty||''}" placeholder="0" onchange="dqRows[${i}].qty=this.value">
        <span class="dq-unit">c/s</span>
      </div>
      ${i>0?`<button class="dq-del" onclick="dqRows.splice(${i},1);renderDqRows()">×</button>`:''}
    `;
    cont.appendChild(wrap);
  });
}

function addDqRow(){ dqRows.push({date:'',qty:''}); renderDqRows(); }

// ===== カートに追加 =====
function addToCart(){
  const invalid=dqRows.some(r=>!r.date||!r.qty);
  if(invalid){
    const m=document.getElementById('detail-msg');
    m.textContent='納入日と数量を入力してください'; m.style.display='block'; return;
  }
  const cat=currentCat+(currentSubcat?' / '+currentSubcat:'');
  cartItems.push({
    cat, size:currentSize, daimoku,
    client: getClientVal(),
    dates:[...dqRows.map(r=>({...r}))],
    isNew: currentSizeIsNew
  });
  currentSubcat=''; currentSize='';
  updateCartBadge(); renderCart();
  goTo('cart');
}

// ===== カート描画 =====
function renderCart(){
  const list=document.getElementById('cart-list');
  list.innerHTML='';
  cartItems.forEach((item,i)=>{
    const card=document.createElement('div'); card.className='cart-card';
    const datesText=item.dates.map(d=>`${d.date}　${d.qty}c/s`).join(' / ');
    const meta=[item.client?`客先: ${item.client}`:'', `台木: ${item.daimoku}`].filter(Boolean).join('　');
    card.innerHTML=`
      <button class="cart-del-btn" onclick="removeCart(${i})">×</button>
      <div class="cart-cat">${item.cat}</div>
      <div class="cart-size">${item.size}</div>
      <div class="cart-meta">${meta}</div>
      <div class="cart-meta">${datesText}</div>
    `;
    list.appendChild(card);
  });
  document.getElementById('cart-sub').textContent=cartItems.length+'件の依頼';
}

function removeCart(i){ cartItems.splice(i,1); updateCartBadge(); renderCart(); }

function updateCartBadge(){
  const b=document.getElementById('cart-badge');
  if(cartItems.length){ b.style.display=''; b.textContent=cartItems.length; }
  else b.style.display='none';
  const icon=document.getElementById('cart-icon');
  icon.setAttribute('stroke', cartItems.length?'#007aff':'#8e8e93');
  document.getElementById('tab-cart').classList.toggle('active', cartItems.length>0);
}

// ===== 送信 =====
function submitCart(){
  const requester=document.getElementById('c-requester').value;
  const m=document.getElementById('cart-msg');
  if(!requester){ m.textContent='依頼者名を選択してください'; m.style.display='block'; return; }
  if(!cartItems.length){ m.textContent='品目を追加してください'; m.style.display='block'; return; }
  m.style.display='none';

  const btn=document.getElementById('submit-btn');
  btn.disabled=true; btn.textContent='送信中...'; btn.style.opacity='.6';

  const note=document.getElementById('c-note').value;
  const params=new URLSearchParams();
  params.set('依頼者名', requester);
  params.set('品目数', cartItems.length);
  cartItems.forEach((item,i)=>{
    params.set(`品目${i+1}_客先名`, item.client||'');
    params.set(`品目${i+1}_カテゴリ`, item.cat);
    params.set(`品目${i+1}_サイズ`, item.size);
    params.set(`品目${i+1}_台木リフト`, item.daimoku);
    item.dates.forEach((d,j)=>{
      params.set(`品目${i+1}_納入日${j+1}`, d.date);
      params.set(`品目${i+1}_数量${j+1}`, d.qty);
    });
  });
  params.set('備考', note);

  fetch(`${GAS_URL}?${params.toString()}`)
    .then(r=>r.text())
    .then(()=>{
      btn.disabled=false; btn.textContent='送信する'; btn.style.opacity='';
      // 新サイズ案内
      const newItems=cartItems.filter(it=>it.isNew);
      const afterNotice=document.getElementById('shikumi-after-notice');
      if(newItems.length){
        const list=newItems.map(it=>`<li>${it.cat}　${it.size}</li>`).join('');
        afterNotice.innerHTML=`⚠️ ${newItems.length}件の新サイズがあります。仕組オーダーシートを作成してください。<ul style="margin:6px 0 0 16px">${list}</ul><div style="margin-top:8px"><a class="shikumi-btn" href="${SHIKUMI_FORM_URL}" target="_blank" rel="noopener">🔧 仕組オーダーシートを開く</a></div>`;
        afterNotice.style.display='block';
      } else {
        afterNotice.style.display='none';
      }
      goTo('success');
    })
    .catch(()=>{
      btn.disabled=false; btn.textContent='送信する'; btn.style.opacity='';
      m.textContent='❌ 送信に失敗しました。もう一度お試しください。'; m.style.display='block';
    });
}

// ===== リセット =====
function resetAll(){
  cartItems=[]; currentCat=''; currentSubcat=''; currentSize=''; currentSizeIsNew=false;
  document.getElementById('c-requester').value='';
  document.getElementById('c-note').value='';
  document.getElementById('cart-msg').style.display='none';
  updateCartBadge(); renderCart();
  goTo('home');
}

// ===== 画面遷移 =====
const SCREEN_ORDER=['home','subcat','size','detail','cart','success'];
function goTo(name){
  SCREEN_ORDER.forEach(s=>{
    const el=document.getElementById('s-'+s);
    const si=SCREEN_ORDER.indexOf(s), ti=SCREEN_ORDER.indexOf(name);
    if(s===name) el.className='slide';
    else if(si<ti) el.className='slide hidden-left';
    else el.className='slide hidden-right';
  });
  document.getElementById('tab-home').classList.toggle('active', name==='home');
  document.getElementById('tab-cart').classList.toggle('active', name==='cart'||name==='success'||(cartItems.length>0&&name!=='home'));
}

// ===== GASから依頼者・客先取得（JSONP） =====
function loadRequesters(){
  const sel=document.getElementById('c-requester');
  const cb='onReq_'+Date.now();
  window[cb]=function(res){
    delete window[cb]; if(sc.parentNode) sc.parentNode.removeChild(sc);
    const names=(res&&res.requesters)||[];
    if(!names.length) return;
    sel.innerHTML='<option value="">-- 選択してください --</option>';
    names.forEach(n=>{ const o=document.createElement('option'); o.value=n; o.textContent=n; sel.appendChild(o); });
  };
  const sc=document.createElement('script');
  sc.src=`${GAS_URL}?action=getRequesters&callback=${cb}`;
  sc.onerror=()=>{ delete window[cb]; };
  document.body.appendChild(sc);
}

function loadClients(){
  const cb='onCli_'+Date.now();
  window[cb]=function(res){
    delete window[cb]; if(sc.parentNode) sc.parentNode.removeChild(sc);
    const names=(res&&res.clients)||[];
    if(!names.length) return;
    CLIENTS=names; populateClientSelect();
  };
  const sc=document.createElement('script');
  sc.src=`${GAS_URL}?action=getClients&callback=${cb}`;
  sc.onerror=()=>{ delete window[cb]; };
  document.body.appendChild(sc);
}

// 仕組オーダーシート完了検知
window.addEventListener('storage',function(e){
  if(e.key==='shikumi_done'){
    const el=document.getElementById('shikumi-after-notice');
    if(el) el.style.display='none';
  }
});

init();
</script>
