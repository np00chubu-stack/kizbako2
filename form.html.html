<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>木箱依頼フォーム</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Meiryo','Yu Gothic',sans-serif;background:#f0f2f5;color:#333;min-height:100vh}
.container{max-width:720px;margin:24px auto;padding:0 12px 40px}
h1{font-size:18px;font-weight:bold;color:#1a3a5c;border-bottom:2px solid #1a3a5c;padding-bottom:8px;margin-bottom:20px}
.card{background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.1);padding:18px;margin-bottom:14px}
.form-group{margin-bottom:12px}
label{display:block;font-size:12px;font-weight:bold;color:#555;margin-bottom:3px}
label .req{color:#e53e3e;margin-left:2px}
select,input[type="date"],input[type="number"],input[type="text"],textarea{
  width:100%;padding:7px 9px;border:1px solid #ccc;border-radius:4px;
  font-size:13px;font-family:inherit;background:#fff;
}
select:focus,input:focus,textarea:focus{outline:none;border-color:#3182ce;box-shadow:0 0 0 2px rgba(49,130,206,.2)}

/* 品目カード */
.item-block{background:#f7f9fc;border:1px solid #d0d8e4;border-radius:6px;padding:14px;margin-bottom:10px}
.item-block-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.item-num{font-size:12px;font-weight:bold;color:#2c5282;background:#dbeafe;padding:2px 8px;border-radius:10px}
.btn-del-item{background:none;border:none;color:#999;font-size:18px;cursor:pointer;line-height:1;padding:2px 6px}
.btn-del-item:hover{color:#e53e3e}

/* 自由入力切替 */
.input-toggle{display:flex;gap:6px;align-items:center}
.input-toggle select,.input-toggle input{flex:1}
.btn-free{font-size:11px;white-space:nowrap;padding:6px 10px;border:1px solid #aaa;border-radius:4px;background:#fff;cursor:pointer;color:#555}
.btn-free:hover{background:#f0f4f8}

/* 台木リフト */
.daimoku-row{display:flex;gap:8px;margin-top:6px}
.daimoku-row label{font-size:12px;font-weight:normal;color:#555;display:flex;align-items:center;gap:4px;cursor:pointer;flex:1;padding:6px 10px;border:1px solid #ccc;border-radius:4px;background:#fff}
.daimoku-row input[type="radio"]{width:auto;margin:0}
.daimoku-row label.selected{border-color:#2c5282;background:#dbeafe;color:#1a3a5c;font-weight:bold}

/* 納入日行 */
.date-rows{display:flex;flex-direction:column;gap:6px}
.date-row{display:grid;grid-template-columns:1fr 90px auto;gap:8px;align-items:end}
.btn-add-date{font-size:12px;color:#3182ce;background:none;border:1px dashed #3182ce;border-radius:4px;padding:4px 10px;cursor:pointer;margin-top:4px;display:inline-block}
.btn-add-date:hover{background:#ebf8ff}

/* ＋品目ボタン */
.btn-add-item{width:100%;padding:10px;border:2px dashed #3182ce;border-radius:6px;background:none;color:#3182ce;font-size:14px;font-weight:bold;cursor:pointer;margin-bottom:14px}
.btn-add-item:hover{background:#ebf8ff}

/* 送信ボタン */
.btn-submit{width:100%;padding:13px;background:#1a3a5c;color:#fff;border:none;border-radius:6px;font-size:16px;font-weight:bold;cursor:pointer}
.btn-submit:hover{background:#2c5282}
.btn-submit:disabled{background:#aaa;cursor:not-allowed}

/* 確認画面 */
#confirm-screen{display:none}
.confirm-table{width:100%;border-collapse:collapse;font-size:13px}
.confirm-table th{background:#f0f4f8;text-align:left;padding:7px 10px;font-weight:bold;color:#555;width:130px;border:1px solid #e2e8f0;white-space:nowrap}
.confirm-table td{padding:7px 10px;border:1px solid #e2e8f0;vertical-align:top}
.confirm-table td input[type="text"],.confirm-table td input[type="date"],.confirm-table td input[type="number"]{width:100%;padding:4px 6px;border:1px solid #ccc;border-radius:3px;font-size:13px}
.item-confirm-block{background:#f7f9fc;border:1px solid #d0d8e4;border-radius:6px;padding:12px;margin-bottom:10px}
.confirm-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.btn-back{padding:12px;background:#fff;border:2px solid #1a3a5c;color:#1a3a5c;border-radius:6px;font-size:15px;font-weight:bold;cursor:pointer}
.btn-back:hover{background:#f0f4f8}
.btn-send{padding:12px;background:#1a3a5c;color:#fff;border:none;border-radius:6px;font-size:15px;font-weight:bold;cursor:pointer}
.btn-send:hover{background:#2c5282}
.btn-send:disabled{background:#aaa;cursor:not-allowed}

/* 送信後ボタン */
.after-send-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px;display:none}
.btn-continue{padding:12px;background:#276749;color:#fff;border:none;border-radius:6px;font-size:15px;font-weight:bold;cursor:pointer}
.btn-continue:hover{background:#2f855a}
.btn-close{padding:12px;background:#fff;border:2px solid #999;color:#555;border-radius:6px;font-size:15px;font-weight:bold;cursor:pointer}
.btn-close:hover{background:#f0f0f0}

#msg{margin-top:14px;font-size:14px;text-align:center;padding:10px;border-radius:4px}
#msg.ok{color:#276749;background:#f0fff4;border:1px solid #9ae6b4}
#msg.err{color:#c53030;background:#fff5f5;border:1px solid #fc8181}
#msg2{margin-top:14px;font-size:14px;text-align:center;padding:10px;border-radius:4px}
#msg2.ok{color:#276749;background:#f0fff4;border:1px solid #9ae6b4}
#msg2.err{color:#c53030;background:#fff5f5;border:1px solid #fc8181}

.subcat-group{display:none}
.subcat-group.active{display:block}
</style>
</head>
<body>
<div class="container">

<!-- ===== 入力画面 ===== -->
<div id="input-screen">
  <h1>🪵 木箱依頼フォーム</h1>

  <!-- 依頼者名 -->
  <div class="card">
    <div class="form-group">
      <label>依頼者名<span class="req">*</span></label>
      <select id="requester">
        <option value="">-- 読み込み中... --</option>
      </select>
    </div>
  </div>

  <!-- 品目ブロック -->
  <div id="items-container"></div>

  <button class="btn-add-item" onclick="addItem()">＋ 品目を追加する</button>

  <!-- 備考 -->
  <div class="card">
    <div class="form-group">
      <label>備考（任意）</label>
      <textarea id="note" rows="3" placeholder="特記事項があれば入力してください"></textarea>
    </div>
  </div>

  <button class="btn-submit" onclick="goConfirm()">内容を確認する →</button>
  <div id="msg"></div>
</div>

<!-- ===== 確認画面 ===== -->
<div id="confirm-screen">
  <h1>🪵 依頼内容の確認</h1>
  <p style="font-size:13px;color:#666;margin-bottom:14px">内容を直接編集できます。よければ「送信する」を押してください。</p>
  <div id="confirm-content"></div>
  <div class="confirm-btns" id="confirm-btns">
    <button class="btn-back" onclick="goBack()">← 戻る</button>
    <button class="btn-send" id="btn-send" onclick="submitForm()">送信する</button>
  </div>
  <div class="after-send-btns" id="after-send-btns">
    <button class="btn-continue" onclick="continueForm()">続けて依頼する</button>
    <button class="btn-close" onclick="closeForm()">閉じる</button>
  </div>
  <div id="msg2"></div>
</div>

</div>

function onCatChange(id){
  document.getElementById(`subcat-koki-${id}`).classList.remove('active');

  if(cat==='工機') document.getElementById(`subcat-koki-${id}`).classList.add('active');
  else if(cat==='3000まで' || cat==='3001以上'){
    // カテゴリ一覧から直接「3000まで」「3001以上」を選んだ場合、サブカテゴリを経由せずそのままサイズ一覧を表示
    populateSizeSorted(id, itemData['その他'][cat]);
  }
  else if(cat==='__other__'){
    // カテゴリ自由入力 → サイズも自由入力に切り替え
    const itemSel=document.getElementById(`item-sel-${id}`);
    itemSel.innerHTML='<option value="__other__">直接入力</option>';
    itemSel.style.display='none';
    document.getElementById(`item-text-${id}`).style.display='';
    document.getElementById(`item-back-${id}`).style.display='';
    document.getElementById(`item-back-${id}`).onclick=()=>{ clearSizeSelect(id); document.getElementById(`cat-${id}`).value=''; };
    document.getElementById(`daimoku-group-${id}`).style.display='';
    updateDaimokuStyle(id);
    toggleNewSizeNotice(id, true);
  }
  else if(cat && itemData[cat]) populateSize(id, itemData[cat]);
}

// 数字（サイズ）順にソートしてサイズ一覧を表示（「3000まで」「3001以上」用）
function populateSizeSorted(id, list){
  const arr=[...list];
  arr.sort((a,b)=>{
    if(a==='該当なし') return -1;
    if(b==='該当なし') return 1;
    const na=a.match(/\d+/g)||[]; const nb=b.match(/\d+/g)||[];
    for(let i=0;i<Math.max(na.length,nb.length);i++){
      const d=(parseInt(na[i])||0)-(parseInt(nb[i])||0);
      if(d!==0) return d;
    }
    return 0;
  });
  populateSize(id, arr);
}

function toggleNewSizeNotice(id, show){
  const el=document.getElementById(`new-size-notice-${id}`);
  if(el) el.style.display = show ? '' : 'none';

function populateSize(id, arr){
  const sel=document.getElementById(`item-sel-${id}`);
  sel.innerHTML='<option value="">-- 選択 --</option>';
  arr.forEach(v=>{ const o=document.createElement('option'); o.value=v; o.textContent=v; sel.appendChild(o); });
  // 「自由入力」を末尾に追加
  const o=document.createElement('option'); o.value='__other__'; o.textContent='その他（直接入力）'; sel.appendChild(o);
}

function updateDaimokuStyle(id){
  const radios=document.querySelectorAll(`input[name="daimoku-${id}"]`);
  radios.forEach(r=>{
    const lbl=r.parentElement;
    if(r.checked) lbl.classList.add('selected');
    else lbl.classList.remove('selected');
  });
}

function getDaimoku(id){
  const r=document.querySelector(`input[name="daimoku-${id}"]:checked`);
  return r?r.value:'なし';
}

function collectItems(){
  const blocks=document.querySelectorAll('.item-block');
  const items=[];
  blocks.forEach(block=>{
    const id=block.id.replace('item-','');
    const catSel=document.getElementById(`cat-${id}`);
    let cat=catSel.value;
    let catDisplay=cat;
    if(cat==='工機'){
      const sub=getSubcatVal(id);
      catDisplay=sub?`工機_${sub}`:'工機';
    } else if(cat==='__other__'){
      // カテゴリ自由入力の場合、サイズ欄に全部入力してもらう
      catDisplay='その他';
    }
    const sizeVal=getSizeVal(id);
    const daimoku=getDaimoku(id);
    const client=getClientVal(id);
    const dates=[];
    const dateInputs=block.querySelectorAll('.date-input');
    const qtyInputs=block.querySelectorAll('.qty-input');
    dateInputs.forEach((d,i)=>{ if(d.value||qtyInputs[i].value) dates.push({date:d.value,qty:qtyInputs[i].value}); });
    items.push({cat:catDisplay,size:sizeVal,daimoku,client,dates});
  });
  return items;
}

function goConfirm(){
  const requester=document.getElementById('requester').value;
  if(!requester){ showMsg('依頼者名を選択してください。','err'); return; }
  const items=collectItems();
  if(!items.length){ showMsg('品目を1つ以上追加してください。','err'); return; }
  let valid=true;
  items.forEach((it,i)=>{
    if(!it.cat||it.cat==='工機'){ valid=false; showMsg(`品目${i+1}：カテゴリを選択してください。`,'err'); }
    if(!it.size){ valid=false; showMsg(`品目${i+1}：サイズを選択または入力してください。`,'err'); }
    if(!it.dates.length||!it.dates[0].date||!it.dates[0].qty){ valid=false; showMsg(`品目${i+1}：納入日と数量を入力してください。`,'err'); }
  });
  if(!valid) return;

  const note=document.getElementById('note').value;

  let html=`
    <div class="card">
      <table class="confirm-table">
        <tr><th>依頼者名</th><td><input type="text" id="c-requester" value="${requester}"></td></tr>
      </table>
    </div>`;

  items.forEach((it,i)=>{
    const dateRows=it.dates.map((d,j)=>`
      <tr>
        <th>納入日${j+1}・数量</th>
        <td style="display:flex;gap:6px;align-items:center">
          <input type="date" class="c-date-${i}" value="${d.date}" style="flex:1">
          <input type="number" class="c-qty-${i}" value="${d.qty}" min="1" style="width:70px"> c/s
        </td>
      </tr>`).join('');
    html+=`
      <div class="item-confirm-block">
        <div style="font-size:12px;font-weight:bold;color:#2c5282;margin-bottom:8px">品目 ${i+1}</div>
        <table class="confirm-table">
          <tr><th>客先名</th><td><input type="text" id="c-client-${i}" value="${it.client}"></td></tr>
          <tr><th>カテゴリ</th><td><input type="text" id="c-cat-${i}" value="${it.cat}"></td></tr>
          <tr><th>サイズ</th><td><input type="text" id="c-size-${i}" value="${it.size}"></td></tr>
          <tr><th>台木リフト</th><td><input type="text" id="c-daimoku-${i}" value="${it.daimoku}"></td></tr>
          ${dateRows}
        </table>
      </div>`;
  });

  html+=`
    <div class="card">
      <table class="confirm-table">
        <tr><th>備考</th><td><textarea id="c-note" rows="3" style="width:100%;padding:6px;border:1px solid #ccc;border-radius:3px;font-size:13px;font-family:inherit">${note}</textarea></td></tr>
      </table>
    </div>`;

  document.getElementById('confirm-content').innerHTML=html;
  document.getElementById('input-screen').style.display='none';
  document.getElementById('confirm-screen').style.display='block';
  document.getElementById('confirm-btns').style.display='grid';
  document.getElementById('after-send-btns').style.display='none';
  document.getElementById('msg2').textContent='';
  document.getElementById('msg2').className='';
  window._confirmItemCount=items.length;
  window.scrollTo(0,0);
}

function goBack(){
  document.getElementById('confirm-screen').style.display='none';
  document.getElementById('input-screen').style.display='block';
  window.scrollTo(0,0);
}

function submitForm(){
  const btn=document.getElementById('btn-send');
  btn.disabled=true; btn.textContent='送信中...';

  const requester=document.getElementById('c-requester').value;
  const note=document.getElementById('c-note').value;
  const n=window._confirmItemCount;

  const params=new URLSearchParams();
  params.set('依頼者名',requester);
  params.set('品目数',n);

  for(let i=0;i<n;i++){
    params.set(`品目${i+1}_客先名`, document.getElementById(`c-client-${i}`).value);
    params.set(`品目${i+1}_カテゴリ`, document.getElementById(`c-cat-${i}`).value);
    params.set(`品目${i+1}_サイズ`, document.getElementById(`c-size-${i}`).value);
    params.set(`品目${i+1}_台木リフト`, document.getElementById(`c-daimoku-${i}`).value);
    const dates=document.querySelectorAll(`.c-date-${i}`);
    const qtys=document.querySelectorAll(`.c-qty-${i}`);
    dates.forEach((d,j)=>{ params.set(`品目${i+1}_納入日${j+1}`,d.value); params.set(`品目${i+1}_数量${j+1}`,qtys[j].value); });
  }
  params.set('備考',note);

  fetch(`${GAS_URL}?${params.toString()}`)
    .then(r=>r.text())
    .then(()=>{
      document.getElementById('confirm-content').innerHTML='<p style="text-align:center;font-size:16px;color:#276749;padding:30px">✅ 送信が完了しました！</p>';
      document.getElementById('msg2').className='';
      document.getElementById('msg2').textContent='';
      document.getElementById('confirm-btns').style.display='none';
      document.getElementById('after-send-btns').style.display='grid';
      // btn-sendをリセット（続けて送信用）
      btn.disabled=false; btn.textContent='送信する';
    })
    .catch(()=>{
      document.getElementById('msg2').className='err';
      document.getElementById('msg2').textContent='❌ 送信に失敗しました。もう一度お試しください。';
      btn.disabled=false; btn.textContent='送信する';
    });
}

function continueForm(){
  // フォームをリセットして入力画面に戻る
  document.getElementById('requester').value='';
  document.getElementById('note').value='';
  document.getElementById('items-container').innerHTML='';
  itemCount=0;
  addItem();
  document.getElementById('confirm-screen').style.display='none';
  document.getElementById('input-screen').style.display='block';
  document.getElementById('confirm-btns').style.display='grid';
  document.getElementById('after-send-btns').style.display='none';
  document.getElementById('msg').textContent='';
  document.getElementById('msg').className='';
  window.scrollTo(0,0);
}

function closeForm(){
  // スマホではwindow.close()が効かないためトップに戻す
  if(!window.close()){
    document.getElementById('confirm-screen').style.display='none';
    document.getElementById('input-screen').style.display='block';
    document.getElementById('confirm-btns').style.display='grid';
    document.getElementById('after-send-btns').style.display='none';
    document.getElementById('items-container').innerHTML='';
    itemCount=0; addItem();
    document.getElementById('requester').value='';
    document.getElementById('note').value='';
    document.getElementById('msg').textContent='';
    window.scrollTo(0,0);
    showMsg('送信が完了しました。続けて入力できます。','ok');
  }
}

function showMsg(text,type){
  const m=document.getElementById('msg');
  m.className=type; m.textContent=text;
}

// =============================================
// 依頼者一覧をGAS（カレンダースプシ「依頼者一覧」シート）から取得
// JSONPで取得（GAS Webアプリはfetchで直接読むとCORSで弾かれるため）
// =============================================
function loadRequesters(){
  const sel = document.getElementById('requester');
  const cbName = 'onRequestersLoaded_' + Date.now();

  window[cbName] = function(res){
    delete window[cbName];
    if(script.parentNode) script.parentNode.removeChild(script);

    sel.innerHTML = '<option value="">-- 選択してください --</option>';
    const names = (res && res.requesters) ? res.requesters : [];
    if(!names.length){
      // 取得失敗・空の場合は選択不可にせず、最低限フォームは使えるようにする
      sel.innerHTML += '<option value="" disabled>（依頼者一覧の取得に失敗しました）</option>';
      return;
    }
    names.forEach(n=>{
      const o=document.createElement('option');
      o.value=n; o.textContent=n;
      sel.appendChild(o);
    });
  };

  const script = document.createElement('script');
  script.src = `${GAS_URL}?action=getRequesters&callback=${cbName}`;
  script.onerror = function(){
    delete window[cbName];
    sel.innerHTML = '<option value="">-- 選択してください --</option><option value="" disabled>（依頼者一覧の取得に失敗しました）</option>';
  };
  document.body.appendChild(script);
}

// =============================================
// 客先名一覧をGAS（カレンダースプシ「客先名一覧」シート）から取得
// 取得後、既に表示されている品目ブロックの客先名プルダウンも更新する
// =============================================
function loadClients(){
  const cbName = 'onClientsLoaded_' + Date.now();

  window[cbName] = function(res){
    delete window[cbName];
    if(script.parentNode) script.parentNode.removeChild(script);

    const names = (res && res.clients) ? res.clients : [];
    if(!names.length) return; // 取得失敗時は初期値（埋め込み済みの18社）のまま維持

    CLIENTS = names;
    refreshAllClientSelects();
  };

  const script = document.createElement('script');
  script.src = `${GAS_URL}?action=getClients&callback=${cbName}`;
  script.onerror = function(){ delete window[cbName]; }; // 失敗時は初期値のまま維持
  document.body.appendChild(script);
}

// 表示中の全品目ブロックの客先名プルダウンを、最新のCLIENTSで再構築する
// （選択中の値は可能な範囲で維持する）
function refreshAllClientSelects(){
  document.querySelectorAll('.item-block').forEach(block=>{
    const id = block.id.replace('item-','');
    const sel = document.getElementById(`client-sel-${id}`);
    if(!sel) return;
    const current = sel.value;
    let opts = `<option value="">-- なし / 選択 --</option>`;
    CLIENTS.forEach(c=>{ opts+=`<option value="${c}">${c}</option>`; });
    opts += `<option value="__other__">その他（直接入力）</option>`;
    sel.innerHTML = opts;
    if(current && CLIENTS.includes(current)) sel.value = current;
  });
}

addItem();
loadRequesters();
loadClients();
</script>
