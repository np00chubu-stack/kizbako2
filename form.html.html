<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>木箱依頼フォーム</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Meiryo','Yu Gothic',sans-serif;background:#f0f2f5;color:#333;min-height:100vh}
.container{max-width:720px;margin:24px auto;padding:0 12px 40px}
h1{font-size:18px;font-weight:bold;color:#1a3a5c;border-bottom:2px solid #1a3a5c;padding-bottom:8px;margin-bottom:20px}
.card{background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.1);padding:18px;margin-bottom:14px}
.card-title{font-size:12px;font-weight:bold;color:#666;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.form-group{margin-bottom:12px}
label{display:block;font-size:12px;font-weight:bold;color:#555;margin-bottom:3px}
label .req{color:#e53e3e;margin-left:2px}
select,input[type="date"],input[type="number"],textarea{
  width:100%;padding:7px 9px;border:1px solid #ccc;border-radius:4px;
  font-size:13px;font-family:inherit;background:#fff;
}
select:focus,input:focus,textarea:focus{outline:none;border-color:#3182ce;box-shadow:0 0 0 2px rgba(49,130,206,.2)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 90px 90px;gap:8px;align-items:end}

/* 品目カード */
.item-block{background:#f7f9fc;border:1px solid #d0d8e4;border-radius:6px;padding:14px;margin-bottom:10px;position:relative}
.item-block-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.item-num{font-size:12px;font-weight:bold;color:#2c5282;background:#dbeafe;padding:2px 8px;border-radius:10px}
.btn-del-item{background:none;border:none;color:#999;font-size:18px;cursor:pointer;line-height:1;padding:2px 6px}
.btn-del-item:hover{color:#e53e3e}

/* 納入日行 */
.date-rows{display:flex;flex-direction:column;gap:6px}
.date-row{display:grid;grid-template-columns:1fr 80px;gap:8px;align-items:end}
.btn-add-date{font-size:12px;color:#3182ce;background:none;border:1px dashed #3182ce;border-radius:4px;padding:4px 10px;cursor:pointer;margin-top:4px;display:inline-block}
.btn-add-date:hover{background:#ebf8ff}

/* ＋品目ボタン */
.btn-add-item{width:100%;padding:10px;border:2px dashed #3182ce;border-radius:6px;background:none;color:#3182ce;font-size:14px;font-weight:bold;cursor:pointer;margin-bottom:14px}
.btn-add-item:hover{background:#ebf8ff}

/* 送信ボタン */
.btn-submit{width:100%;padding:13px;background:#1a3a5c;color:#fff;border:none;border-radius:6px;font-size:16px;font-weight:bold;cursor:pointer}
.btn-submit:hover{background:#2c5282}
.btn-submit:disabled{background:#aaa;cursor:not-allowed}

/* 確認画面 */
#confirm-screen{display:none}
.confirm-table{width:100%;border-collapse:collapse;font-size:13px}
.confirm-table th{background:#f0f4f8;text-align:left;padding:7px 10px;font-weight:bold;color:#555;width:120px;border:1px solid #e2e8f0}
.confirm-table td{padding:7px 10px;border:1px solid #e2e8f0;vertical-align:top}
.confirm-table td input,.confirm-table td select{width:100%;padding:4px 6px;border:1px solid #ccc;border-radius:3px;font-size:13px;font-family:inherit}
.item-confirm-block{background:#f7f9fc;border:1px solid #d0d8e4;border-radius:6px;padding:12px;margin-bottom:10px}
.confirm-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.btn-back{padding:12px;background:#fff;border:2px solid #1a3a5c;color:#1a3a5c;border-radius:6px;font-size:15px;font-weight:bold;cursor:pointer}
.btn-back:hover{background:#f0f4f8}
.btn-send{padding:12px;background:#1a3a5c;color:#fff;border:none;border-radius:6px;font-size:15px;font-weight:bold;cursor:pointer}
.btn-send:hover{background:#2c5282}
.btn-send:disabled{background:#aaa;cursor:not-allowed}

#msg{margin-top:14px;font-size:14px;text-align:center;padding:10px;border-radius:4px}
#msg.ok{color:#276749;background:#f0fff4;border:1px solid #9ae6b4}
#msg.err{color:#c53030;background:#fff5f5;border:1px solid #fc8181}

.subcat-group{display:none}
.subcat-group.active{display:block}
</style>
</head>
<body>
<div class="container">

<!-- ===== 入力画面 ===== -->
<div id="input-screen">
  <h1>🪵 木箱依頼フォーム</h1>

  <!-- 依頼者・客先 -->
  <div class="card">
    <div class="row2">
      <div class="form-group">
        <label>依頼者名<span class="req">*</span></label>
        <select id="requester">
          <option value="">-- 選択 --</option>
          <option>佐藤</option><option>小林</option><option>長谷川</option><option>堀</option>
          <option>中村</option><option>宮地</option><option>苅谷</option><option>平野</option>
          <option>福田</option><option>東</option><option>田中</option><option>澤田</option>
          <option>丹羽</option><option>八島</option><option>八木</option><option>鈴木</option>
        </select>
      </div>
      <div class="form-group">
        <label>客先名</label>
        <select id="client">
          <option value="">-- なし / 選択 --</option>
          <option>TSMC</option><option>O-PRO</option><option>SMIC</option><option>IMEC</option>
          <option>Infineon</option><option>Micron</option><option>Yongxin</option><option>TI</option>
          <option>松下電子材料</option><option>SMOC</option><option>SK Hynix</option>
          <option>VisEra</option><option>SPIL</option><option>Nexchip</option>
          <option>ASE</option><option>Applied</option><option>Officemate</option><option>共通</option>
        </select>
      </div>
    </div>
  </div>

  <!-- 品目ブロック -->
  <div id="items-container"></div>

  <button class="btn-add-item" onclick="addItem()">＋ 品目を追加する</button>

  <!-- 備考 -->
  <div class="card">
    <div class="form-group">
      <label>備考（任意）</label>
      <textarea id="note" rows="3" placeholder="特記事項があれば入力してください"></textarea>
    </div>
  </div>

  <button class="btn-submit" onclick="goConfirm()">内容を確認する →</button>
  <div id="msg"></div>
</div>

<!-- ===== 確認画面 ===== -->
<div id="confirm-screen">
  <h1>🪵 依頼内容の確認</h1>
  <p style="font-size:13px;color:#666;margin-bottom:14px">内容を直接編集できます。よければ「送信する」を押してください。</p>
  <div id="confirm-content"></div>
  <div class="confirm-btns">
    <button class="btn-back" onclick="goBack()">← 戻る</button>
    <button class="btn-send" id="btn-send" onclick="submitForm()">送信する</button>
  </div>
  <div id="msg2"></div>
</div>

</div><!-- /container -->

let itemCount = 0;

function makeSelect(name, optArr, selVal){
  let h = `<select name="${name}" style="width:100%;padding:7px 9px;border:1px solid #ccc;border-radius:4px;font-size:13px;font-family:inherit">`;
  optArr.forEach(o=>{ h+=`<option value="${o}"${o===selVal?' selected':''}>${o}</option>`; });
  return h+'</select>';
}

function addItem(data){
  itemCount++;
  const id = itemCount;
  const div = document.createElement('div');
  div.className = 'item-block';
  div.id = `item-${id}`;

  // カテゴリ選択肢
  const normalCats = Object.keys(itemData).filter(k=>!['工機','その他'].includes(k));
  let catOpts = '<option value="">-- 選択 --</option>';
  normalCats.forEach(c=>{ catOpts+=`<option value="${c}">${c}</option>`; });
  catOpts += '<option value="工機">工機</option><option value="その他">その他</option>';

  div.innerHTML = `
    <div class="item-block-header">
      <span class="item-num">品目 ${id}</span>
      ${id>1?`<button class="btn-del-item" onclick="removeItem(${id})" title="削除">×</button>`:''}
    </div>
    <div class="form-group">
      <label>カテゴリ<span class="req">*</span></label>
      <select id="cat-${id}" onchange="onCatChange(${id})">
        ${catOpts}
      </select>
    </div>
    <div class="subcat-group" id="subcat-koki-${id}">
      <div class="form-group">
        <label>工機 サブカテゴリ<span class="req">*</span></label>
        <select id="subcat-${id}" onchange="onSubCatChange(${id})">
          <option value="">-- 選択 --</option>
          ${Object.keys(itemData['工機']).map(k=>`<option value="${k}">${k}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="subcat-group" id="subcat-sonota-${id}">
      <div class="form-group">
        <label>その他 区分<span class="req">*</span></label>
        <select id="sonota-${id}" onchange="onSonotaChange(${id})">
          <option value="">-- 選択 --</option>
          <option value="3000まで">3000まで</option>
          <option value="3001以上">3001以上</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>品目・サイズ<span class="req">*</span></label>
      <select id="item-sel-${id}">
        <option value="">-- カテゴリを先に選択 --</option>
      </select>
    </div>
    <div class="form-group">
      <label>納入日・数量<span class="req">*</span></label>
      <div class="date-rows" id="dates-${id}">
        <div class="date-row">
          <div><label style="font-size:11px;color:#777">日付</label><input type="date" class="date-input"></div>
          <div><label style="font-size:11px;color:#777">数量(c/s)</label><input type="number" class="qty-input" min="1" placeholder="個"></div>
        </div>
      </div>
      <button class="btn-add-date" onclick="addDateRow(${id})">＋ 日付・数量を追加</button>
    </div>
  `;
  document.getElementById('items-container').appendChild(div);
}

function removeItem(id){
  const el = document.getElementById(`item-${id}`);
  if(el) el.remove();
}

function addDateRow(id){
  const container = document.getElementById(`dates-${id}`);
  const row = document.createElement('div');
  row.className = 'date-row';
  row.innerHTML = `
    <div><label style="font-size:11px;color:#777">日付</label><input type="date" class="date-input"></div>
    <div style="display:flex;gap:4px;align-items:end">
      <div style="flex:1"><label style="font-size:11px;color:#777">数量(c/s)</label><input type="number" class="qty-input" min="1" placeholder="個"></div>
      <button onclick="this.closest('.date-row').remove()" style="background:none;border:none;color:#999;font-size:16px;cursor:pointer;padding:7px 4px">×</button>
    </div>
  `;
  container.appendChild(row);
}

function onCatChange(id){
  const cat = document.getElementById(`cat-${id}`).value;
  document.getElementById(`subcat-koki-${id}`).classList.remove('active');
  document.getElementById(`subcat-sonota-${id}`).classList.remove('active');
  const itemSel = document.getElementById(`item-sel-${id}`);
  itemSel.innerHTML = '<option value="">-- 選択 --</option>';

  if(cat === '工機'){
    document.getElementById(`subcat-koki-${id}`).classList.add('active');
  } else if(cat === 'その他'){
    document.getElementById(`subcat-sonota-${id}`).classList.add('active');
  } else if(cat && itemData[cat]){
    itemData[cat].forEach(v=>{ const o=document.createElement('option'); o.value=v; o.textContent=v; itemSel.appendChild(o); });
  }
}

function onSubCatChange(id){
  const sub = document.getElementById(`subcat-${id}`).value;
  const itemSel = document.getElementById(`item-sel-${id}`);
  itemSel.innerHTML = '<option value="">-- 選択 --</option>';
  if(sub && itemData['工機'][sub]){
    itemData['工機'][sub].forEach(v=>{ const o=document.createElement('option'); o.value=v; o.textContent=v; itemSel.appendChild(o); });
  }
}

function onSonotaChange(id){
  const sub = document.getElementById(`sonota-${id}`).value;
  const itemSel = document.getElementById(`item-sel-${id}`);
  itemSel.innerHTML = '<option value="">-- 選択 --</option>';
  if(sub && itemData['その他'][sub]){
    itemData['その他'][sub].forEach(v=>{ const o=document.createElement('option'); o.value=v; o.textContent=v; itemSel.appendChild(o); });
  }
}

function collectItems(){
  const blocks = document.querySelectorAll('.item-block');
  const items = [];
  blocks.forEach(block=>{
    const id = block.id.replace('item-','');
    const cat = document.getElementById(`cat-${id}`).value;
    let catDisplay = cat;
    if(cat==='工機'){
      const sub = document.getElementById(`subcat-${id}`).value;
      catDisplay = sub ? `工機_${sub}` : '工機';
    } else if(cat==='その他'){
      const sub = document.getElementById(`sonota-${id}`).value;
      catDisplay = sub ? `その他（${sub}）` : 'その他';
    }
    const itemVal = document.getElementById(`item-sel-${id}`).value;
    const dates = [];
    const dateInputs = block.querySelectorAll('.date-input');
    const qtyInputs = block.querySelectorAll('.qty-input');
    dateInputs.forEach((d,i)=>{ if(d.value||qtyInputs[i].value){ dates.push({date:d.value, qty:qtyInputs[i].value}); } });
    items.push({cat:catDisplay, item:itemVal, dates});
  });
  return items;
}

function goConfirm(){
  const requester = document.getElementById('requester').value;
  if(!requester){ showMsg('依頼者名を選択してください。','err'); return; }

  const items = collectItems();
  let valid = true;
  items.forEach((it,i)=>{
    if(!it.cat||it.cat==='工機'||it.cat==='その他'||!it.item){ valid=false; showMsg(`品目${i+1}のカテゴリ・品目を選択してください。`,'err'); }
    if(!it.dates.length||!it.dates[0].date||!it.dates[0].qty){ valid=false; showMsg(`品目${i+1}の納入日・数量を入力してください。`,'err'); }
  });
  if(!valid) return;
  if(!items.length){ showMsg('品目を1つ以上追加してください。','err'); return; }

  const client = document.getElementById('client').value;
  const note = document.getElementById('note').value;

  // 確認画面を組み立て
  let html = `
    <div class="card">
      <table class="confirm-table">
        <tr><th>依頼者名</th><td><input id="c-requester" value="${requester}"></td></tr>
        <tr><th>客先名</th><td><input id="c-client" value="${client}"></td></tr>
      </table>
    </div>`;

  items.forEach((it,i)=>{
    const dateRows = it.dates.map((d,j)=>`
      <tr>
        <th>納入日${j+1}・数量</th>
        <td style="display:flex;gap:6px">
          <input type="date" class="c-date-${i}" value="${d.date}" style="flex:1">
          <input type="number" class="c-qty-${i}" value="${d.qty}" min="1" style="width:70px"> c/s
        </td>
      </tr>`).join('');
    html += `
      <div class="item-confirm-block">
        <div style="font-size:12px;font-weight:bold;color:#2c5282;margin-bottom:8px">品目 ${i+1}</div>
        <table class="confirm-table">
          <tr><th>カテゴリ</th><td><input id="c-cat-${i}" value="${it.cat}"></td></tr>
          <tr><th>品目・サイズ</th><td><input id="c-item-${i}" value="${it.item}"></td></tr>
          ${dateRows}
        </table>
      </div>`;
  });

  html += `
    <div class="card">
      <table class="confirm-table">
        <tr><th>備考</th><td><textarea id="c-note" rows="3" style="width:100%;padding:6px;border:1px solid #ccc;border-radius:3px;font-size:13px">${note}</textarea></td></tr>
      </table>
    </div>`;

  document.getElementById('confirm-content').innerHTML = html;
  document.getElementById('input-screen').style.display = 'none';
  document.getElementById('confirm-screen').style.display = 'block';
  window.scrollTo(0,0);
  window._confirmItems = items;
}

function goBack(){
  document.getElementById('confirm-screen').style.display = 'none';
  document.getElementById('input-screen').style.display = 'block';
  window.scrollTo(0,0);
}

function submitForm(){
  const btn = document.getElementById('btn-send');
  btn.disabled = true; btn.textContent = '送信中...';

  const requester = document.getElementById('c-requester').value;
  const client = document.getElementById('c-client').value;
  const note = document.getElementById('c-note').value;
  const items = window._confirmItems;

  // パラメータ組み立て（品目ごとにフラット化）
  const params = new URLSearchParams();
  params.set('依頼者名', requester);
  params.set('客先名', client);
  params.set('品目数', items.length);

  items.forEach((it,i)=>{
    const catVal = document.getElementById(`c-cat-${i}`).value;
    const itemVal = document.getElementById(`c-item-${i}`).value;
    params.set(`品目${i+1}_カテゴリ`, catVal);
    params.set(`品目${i+1}_品目サイズ`, itemVal);
    const dates = document.querySelectorAll(`.c-date-${i}`);
    const qtys = document.querySelectorAll(`.c-qty-${i}`);
    dates.forEach((d,j)=>{ params.set(`品目${i+1}_納入日${j+1}`, d.value); params.set(`品目${i+1}_数量${j+1}`, qtys[j].value); });
  });
  params.set('備考', note);

  fetch(`${GAS_URL}?${params.toString()}`)
    .then(r=>r.text())
    .then(()=>{
      document.getElementById('confirm-content').innerHTML = '';
      document.getElementById('msg2').className = 'ok';
      document.getElementById('msg2').textContent = '✅ 送信が完了しました！';
      btn.textContent = '送信済み';
    })
    .catch(()=>{
      document.getElementById('msg2').className = 'err';
      document.getElementById('msg2').textContent = '❌ 送信に失敗しました。もう一度お試しください。';
      btn.disabled = false; btn.textContent = '送信する';
    });
}

function showMsg(text, type){
  const m = document.getElementById('msg');
  m.className = type; m.textContent = text;
}

// 初期品目を1つ追加
addItem();
